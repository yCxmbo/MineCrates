name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [ "v1_20_6", "v1_21" ]
    name: build (${{ matrix.profile }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        # Retry to ride out transient dependency-repo flakiness (e.g. jitpack 403
        # rate-limiting on runner IPs). Once a run succeeds, cached ~/.m2 avoids
        # re-hitting remote repos on later runs.
        run: |
          for attempt in 1 2 3; do
            echo "::group::Maven attempt $attempt"
            if mvn -B -P ${{ matrix.profile }} \
                -Dmaven.wagon.http.retryHandler.count=3 \
                -Dmaven.wagon.http.retryHandler.requestSentEnabled=true \
                verify; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; backing off before retry..."
            sleep $((attempt * 15))
          done
          echo "All Maven attempts failed."
          exit 1
