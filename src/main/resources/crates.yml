crates:
  food:
    display: "<#ff8000>Food Crate</#ff8000>"
    type: BLOCK
    requires-key: true
    key: food_key
    cooldown-seconds: 30
    cost:
      enabled: false      # true to enable
      currency: VAULT     # VAULT | EXP | EXP_LEVELS
      amount: 1000        # money or exp/levels
    hologram:
      enabled: true
      y-offset: 2.3
      lines:
        - "<#ff8000><b>Food Crate</b></#ff8000>"
        - "<#ffbf00>Left Click to Preview</#ffbf00>"
        - "<#ffbf00>Right Click to Open</#ffbf00>"
        - "<gray>store.minestrike.org</gray>"
    particles:
      enabled: false
      # Shapes: RING | RING_SPIN | SPIRAL | DOUBLE_HELIX | COLUMN | STAR
      #         | HEART | VORTEX | SPHERE | WAVE | GALAXY | ATOM
      shape: DOUBLE_HELIX
      type: FLAME         # Bukkit Particle name (e.g. FLAME, END_ROD, HEART)
      radius: 1           # ring radius around the crate
      y-offset: 0         # height above the block center
      points: 48          # particles around the ring
    animation:
      type: ROULETTE      # ROULETTE | REVEAL | CASCADE
      roulette:
        speed-ticks: 2
        cycles: 40
      reveal:
        speed-ticks: 6
        flickers: 16
      cascade:
        speed-ticks: 2
      close-delay-ticks: 20
    pity:
      enabled: false        # guarantee a specific reward after a dry streak
      threshold: 25         # opens without the pity reward before it is forced
      reward: legendary_sword   # id of the guaranteed reward
    rewards:
      # 'weight' is the player's chance to receive a reward: each reward's chance is
      # its weight divided by the sum of all weights in this crate. Tip: make the
      # weights in a crate sum to 100 and each weight reads directly as a percentage
      # (e.g. weight: 30 -> 30% chance). The examples below are tuned to total 100.
      #
      # 'display-name' (optional) sets the name shown on the reward's icon in the
      # preview GUI and open animation. It supports MiniMessage and '&' color codes,
      # and is separate from 'display' (which is used for the win broadcast).
      bread1:
        weight: 50
        announce: false
        message: "<gray>You received:</gray> <gold>16x Bread</gold>"
        display-item:
          material: BREAD
          amount: 1
        items:
          i1:
            material: BREAD
            amount: 16
      bread2:
        weight: 50
        announce: false
        message: "<gray>You received:</gray> <gold>32x Bread</gold>"
        display-item:
          material: BREAD
          amount: 1
        items:
          i1:
            material: BREAD
            amount: 32
